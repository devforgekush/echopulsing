version: "3.9"

services:
  bot:
    build: .
    container_name: echopulsing-music
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: echopulsing-mongo
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
